[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.13.0"

[[repos.hooks]]
id = "ruff-format"

[[repos.hooks]]
id = "ruff"
args = ["--fix"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ty"
name = "ty"
entry = "uv run ty check src tests scripts"
language = "system"
pass_filenames = false
files = "^(src|tests|scripts|pyproject\\.toml)"

[[repos.hooks]]
id = "towncrier"
name = "towncrier"
entry = "uv run python scripts/check_towncrier.py --compare-with origin/main --staged"
language = "system"
pass_filenames = false
files = "^(newsfragments|pyproject\\.toml|CHANGELOG\\.md)"
