# Read the Docs configuration file.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    build:
      html:
        - mkdir -p $READTHEDOCS_OUTPUT/html
        - uv run sphinx-build -W --keep-going -b html docs $READTHEDOCS_OUTPUT/html

python:
  install:
    - method: uv
      command: sync
      groups:
        - dev

formats: []
